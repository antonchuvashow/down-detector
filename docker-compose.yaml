services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-config:/etc/clickhouse-server/config.d:ro
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "${CLICKHOUSE_USER}",
          "--password",
          "${CLICKHOUSE_PASSWORD}",
          "--query",
          "SELECT 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - ch_net
    labels:
      com.project.service: "clickhouse"
      com.project.env: "${COMPOSE_ENV:-local}"

  detector-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-detector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-detector}
      POSTGRES_DB: ${POSTGRES_DB:-detector}
    ports:
      - "5432:5432"
    volumes:
      - detector-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-detector} -d ${POSTGRES_DB:-detector}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ch_net

  postgres-migrate:
    image: migrate/migrate:v4.17.0
    profiles:
      - tools
    volumes:
      - ./migrations/postgres:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-detector}:${POSTGRES_PASSWORD:-detector}@detector-postgres:5432/${POSTGRES_DB:-detector}?sslmode=disable",
        "up"
      ]
    depends_on:
      detector-postgres:
        condition: service_healthy
    networks:
      - ch_net
    labels:
      com.project.service: "postgres-migrate"

  clickhouse-migrate:
    image: migrate/migrate:v4.17.0
    profiles:
      - tools
    volumes:
      - ./migrations/clickhouse:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "clickhouse://clickhouse:9000/?database=${CLICKHOUSE_DB}&username=${CLICKHOUSE_USER}&password=${CLICKHOUSE_PASSWORD}&x-multi-statement=true",
        "up"
      ]
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - ch_net
    labels:
      com.project.service: "clickhouse-migrate"

  down-detector:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/down-detector:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SERVER_PORT:-5436}:5436"
    depends_on:
      detector-postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      superset:
        condition: service_healthy
    environment:
      POSTGRES_ADDR: detector-postgres:5432
      POSTGRES_DB: ${POSTGRES_DB:-detector}
      POSTGRES_USER: ${POSTGRES_USER:-detector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-detector}
      POSTGRES_SSL_MODE: disable

      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

      SERVER_PORT: "5436"
      GIN_MODE: ${GIN_MODE:-release}
      SCHEDULER_CRON: "${SCHEDULER_CRON:-*/10 * * * * *}"

      REPORT_SUBMITTER_SOURCE: ${REPORT_SUBMITTER_SOURCE:-inspector}
      REPORT_SUBMITTER_LATITUDE: "${REPORT_SUBMITTER_LATITUDE:-55.160023}"
      REPORT_SUBMITTER_LONGITUDE: "${REPORT_SUBMITTER_LONGITUDE:-61.401998}"
      REPORT_SUBMITTER_IP: "${REPORT_SUBMITTER_IP:-}"
      REPORT_SUBMITTER_PLATFORM: ${REPORT_SUBMITTER_PLATFORM:-ios}

      SUPERSET_BASE_URL: http://superset:8088
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_GUEST_USERNAME: ${SUPERSET_GUEST_USERNAME:-guest}
      SUPERSET_GUEST_FIRSTNAME: ${SUPERSET_GUEST_FIRSTNAME:-guest}
      SUPERSET_GUEST_LASTNAME: ${SUPERSET_GUEST_LASTNAME:-guest}
      SUPERSET_DASHBOARDS: "${SUPERSET_DASHBOARDS:-}"
      SUPERSET_DASHBOARD_NAME: ${SUPERSET_DASHBOARD_NAME:-Main}
      SUPERSET_DASHBOARD_ID: ${SUPERSET_DASHBOARD_ID:-8f9771f2-2c8a-4e7e-8f10-a5ecd7d39255}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5436/ping >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ch_net
    labels:
      com.project.service: "down-detector"

  superset-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    volumes:
      - superset-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ch_net

  superset-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - superset-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ch_net

  superset-init:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: local/superset-clickhouse:latest
    profiles:
      - init
    restart: "no"
    depends_on:
      superset-postgres:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
    command:
      - /bin/bash
      - -ec
      - |
        echo "Running Superset DB migrations..."
        superset db upgrade

        echo "Creating admin user if needed..."
        superset fab create-admin \
          --username "${SUPERSET_ADMIN_USER:-admin}" \
          --firstname "${SUPERSET_ADMIN_FIRST_NAME:-Admin}" \
          --lastname "${SUPERSET_ADMIN_LAST_NAME:-User}" \
          --email "${SUPERSET_ADMIN_EMAIL:-admin@example.com}" \
          --password "${SUPERSET_ADMIN_PASSWORD:-admin}" \
          || echo "Admin user probably already exists, skipping..."

        echo "Initializing Superset roles and permissions..."
        superset init

        echo "Superset initialized successfully"
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}

      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:superset@superset-postgres:5432/superset

      REDIS_HOST: superset-redis
      REDIS_PORT: "6379"
      CACHE_REDIS_DB: "1"
      RATELIMIT_STORAGE_URI: redis://superset-redis:6379/4

      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_FIRST_NAME: ${SUPERSET_ADMIN_FIRST_NAME:-Admin}
      SUPERSET_ADMIN_LAST_NAME: ${SUPERSET_ADMIN_LAST_NAME:-User}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - superset-home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - ch_net

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: local/superset-clickhouse:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8088"
    depends_on:
      clickhouse:
        condition: service_healthy
      superset-postgres:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      CORS_OPTIONS_ORIGINS: ${CORS_OPTIONS_ORIGINS}

      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:superset@superset-postgres:5432/superset

      REDIS_HOST: superset-redis
      REDIS_PORT: "6379"
      CACHE_REDIS_DB: "1"
      RATELIMIT_STORAGE_URI: redis://superset-redis:6379/4
    volumes:
      - superset-home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - ch_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    labels:
      com.project.service: "superset"

  chouse-ui:
    image: ghcr.io/daun-gatal/chouse-ui:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5521:5521"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      RBAC_ENCRYPTION_KEY: ${RBAC_ENCRYPTION_KEY}
      RBAC_ENCRYPTION_SALT: ${RBAC_ENCRYPTION_SALT}
    volumes:
      - chouse-ui-data:/app/data
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - ch_net
    labels:
      com.project.service: "chouse-ui"

volumes:
  clickhouse-data:
  chouse-ui-data:
  superset-db:
  superset-redis:
  superset-home:
  detector-postgres-data:

networks:
  ch_net:
    driver: bridge
