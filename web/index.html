<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detector – Dashboard</title>
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>
  <nav class="navbar">
    <span class="navbar__brand">Detector</span>
    <ul class="navbar__links">
      <li><a href="/" class="navbar__link navbar__link--active">Дашборды</a></li>
      <li><a href="/report" class="navbar__link">Отправить репорт</a></li>
    </ul>
  </nav>

  <main class="main">

    <!-- Tab bar -->
    <div class="tabs" id="tabs" role="tablist" aria-label="Дашборды"></div>

    <!-- Superset embed container -->
    <div class="embed-wrapper">
      <div id="superset-embed" class="embed-frame">
        <div class="embed-placeholder" id="embed-placeholder">
          <span class="spinner"></span>
          <p>Загрузка дашборда…</p>
        </div>
      </div>
    </div>

    <!-- Error banner (hidden by default) -->
    <div class="alert alert--error hidden" id="embed-error" role="alert">
      <strong>Ошибка загрузки дашборда.</strong>
      <span id="embed-error-msg"></span>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@superset-ui/embedded-sdk@0.1.3/bundle/index.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
